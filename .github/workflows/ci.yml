name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Local D1 migrations
        run: npx wrangler d1 migrations apply malipang-v5-2 --local --persist-to /tmp/malipang-ci
      - name: Wrangler dry run
        run: npx wrangler deploy --dry-run