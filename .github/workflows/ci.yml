name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Build test modules
        run: npm run build:test
      - name: Detailed attendance LINE message tests
        run: node --test tests/attendance-message.test.mjs
      - name: Regression tests Admin
        shell: bash
        run: shopt -s nullglob; files=(tests/[aA]dmin*.test.mjs); if ((${#files[@]})); then node --test "${files[@]}"; fi
      - name: Regression tests Attendance other
        shell: bash
        run: |
          mkdir -p attendance-diagnostics
          : > attendance-diagnostics/failed-files.txt
          : > attendance-diagnostics/output.txt
          shopt -s nullglob
          status=0
          for f in tests/[aA]ttendance*.test.mjs; do
            case "$(basename "$f")" in
              attendance-message.test.mjs) continue ;;
            esac
            echo "===== $f =====" | tee -a attendance-diagnostics/output.txt
            if ! node --test "$f" 2>&1 | tee -a attendance-diagnostics/output.txt; then
              echo "$f" | tee -a attendance-diagnostics/failed-files.txt
              status=1
            fi
          done
          exit "$status"
      - name: Upload attendance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-diagnostics
          path: attendance-diagnostics
      - name: Regression tests A other
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for f in tests/[aA]*.test.mjs; do
            case "$(basename "$f")" in
              admin*|Admin*|attendance*|Attendance*) ;;
              *) files+=("$f") ;;
            esac
          done
          if ((${#files[@]})); then node --test "${files[@]}"; fi
      - name: Regression tests B-F
        shell: bash
        run: shopt -s nullglob; files=(tests/[b-fB-F]*.test.mjs); if ((${#files[@]})); then node --test "${files[@]}"; fi
      - name: Regression tests G-L
        shell: bash
        run: shopt -s nullglob; files=(tests/[g-lG-L]*.test.mjs); if ((${#files[@]})); then node --test "${files[@]}"; fi
      - name: Regression tests M-R
        shell: bash
        run: shopt -s nullglob; files=(tests/[m-rM-R]*.test.mjs); if ((${#files[@]})); then node --test "${files[@]}"; fi
      - name: Regression tests S-Z
        shell: bash
        run: shopt -s nullglob; files=(tests/[s-zS-Z]*.test.mjs); if ((${#files[@]})); then node --test "${files[@]}"; fi
      - name: Local D1 migrations
        run: npx wrangler d1 migrations apply malipang-v5-2 --local --persist-to /tmp/malipang-ci
      - name: Wrangler dry run
        run: npx wrangler deploy --dry-run
