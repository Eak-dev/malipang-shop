name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Build test modules
        run: npm run build:test
      - name: Employee LINE privacy test
        run: node --test tests/attendance-message.test.mjs
      - name: Payroll policy tests
        run: node --test tests/payroll.test.mjs tests/ot.test.mjs tests/owner-ot-command.test.mjs tests/staff-import.test.mjs
      - name: Regression tests A-F
        shell: bash
        run: shopt -s nullglob; files=(tests/[a-fA-F]*.test.mjs); node --test "${files[@]}"
      - name: Regression tests G-L
        shell: bash
        run: shopt -s nullglob; files=(tests/[g-lG-L]*.test.mjs); node --test "${files[@]}"
      - name: Regression tests M-R
        shell: bash
        run: shopt -s nullglob; files=(tests/[m-rM-R]*.test.mjs); node --test "${files[@]}"
      - name: Regression tests S-Z
        shell: bash
        run: shopt -s nullglob; files=(tests/[s-zS-Z]*.test.mjs); node --test "${files[@]}"
      - name: Local D1 migrations
        run: npx wrangler d1 migrations apply malipang-v5-2 --local --persist-to /tmp/malipang-ci
      - name: Wrangler dry run
        run: npx wrangler deploy --dry-run